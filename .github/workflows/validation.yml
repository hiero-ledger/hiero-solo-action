name: PR Validation
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-outputs:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⚙️ Setup Hiero Solo
        id: solo
        uses: ./

      - name: ✅ Validate Hiero Solo Outputs
        env:
          ACCOUNT_ID: ${{ steps.solo.outputs.accountId }}
          PRIVATE_KEY: ${{ steps.solo.outputs.privateKey }}
          PUBLIC_KEY: ${{ steps.solo.outputs.publicKey }}
          ECDSA_ACCOUNT_ID: ${{ steps.solo.outputs.ecdsaAccountId }}
          ECDSA_PRIVATE_KEY: ${{ steps.solo.outputs.ecdsaPrivateKey }}
          ECDSA_PUBLIC_KEY: ${{ steps.solo.outputs.ecdsaPublicKey }}
          ED25519_ACCOUNT_ID: ${{ steps.solo.outputs.ed25519AccountId }}
          ED25519_PRIVATE_KEY: ${{ steps.solo.outputs.ed25519PrivateKey }}
          ED25519_PUBLIC_KEY: ${{ steps.solo.outputs.ed25519PublicKey }}
        run: ${GITHUB_WORKSPACE}/scripts/check-accounts.sh

  validate-outputs-pre-0440:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: 🚀 Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⚙️ Setup Hiero Solo
        id: solo
        uses: ./
        with:
          soloVersion: "0.43.2"

      - name: ✅ Validate Hiero Solo Outputs
        env:
          ACCOUNT_ID: ${{ steps.solo.outputs.accountId }}
          PRIVATE_KEY: ${{ steps.solo.outputs.privateKey }}
          PUBLIC_KEY: ${{ steps.solo.outputs.publicKey }}
          ECDSA_ACCOUNT_ID: ${{ steps.solo.outputs.ecdsaAccountId }}
          ECDSA_PRIVATE_KEY: ${{ steps.solo.outputs.ecdsaPrivateKey }}
          ECDSA_PUBLIC_KEY: ${{ steps.solo.outputs.ecdsaPublicKey }}
          ED25519_ACCOUNT_ID: ${{ steps.solo.outputs.ed25519AccountId }}
          ED25519_PRIVATE_KEY: ${{ steps.solo.outputs.ed25519PrivateKey }}
          ED25519_PUBLIC_KEY: ${{ steps.solo.outputs.ed25519PublicKey }}
        run: ${GITHUB_WORKSPACE}/scripts/check-accounts.sh

  validate-hbar-amount:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: 🚀 Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⚙️ Setup Hiero Solo
        id: solo
        uses: ./
        with:
          hbarAmount: "100000001"

      - name: ✅ Validate Solo Account HBAR Amount
        env:
          ACCOUNT_ID: ${{ steps.solo.outputs.accountId }}
        run: solo ledger account info --account-id "${ACCOUNT_ID}" --deployment "solo-deployment"

  validate-block-node:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: 🚀 Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⚙️ Setup Hiero Solo with Block Node
        id: solo
        uses: ./
        with:
          soloVersion: v0.69.0
          installBlockNode: true
          hieroVersion: 'v0.73.0'

      - name: ✅ Validate Block Node Deployment
        run: |
          echo "Checking deployed resources..."
          kubectl get pods -n solo
          kubectl get svc -n solo

          BLOCK_NODE_POD=""
          for _ in $(seq 1 60); do
            BLOCK_NODE_POD=$(kubectl get pods -n solo -o name | grep 'block-node' | head -n 1 || true)
            if [ -n "${BLOCK_NODE_POD}" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "${BLOCK_NODE_POD}" ]; then
            echo "❌ Error: block node pod not found"
            kubectl get pods -n solo
            exit 1
          fi

          echo "Found block node pod: ${BLOCK_NODE_POD}"
          kubectl wait -n solo --for=condition=Ready "${BLOCK_NODE_POD}" --timeout=300s

  validate-mirror-node:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⚙️ Setup Hiero Solo with MirrorNode
        id: solo
        uses: ./
        with:
          installMirrorNode: true

      - name: ✅ Validate Mirror Node API
        run: |
          # Log Account details for Generic (ED25519), ECDSA, and ED25519
          echo "Generic Account ID (ED25519): ${{ steps.solo.outputs.accountId }}"
          echo "Generic Private Key (ED25519): ${{ steps.solo.outputs.privateKey }}"
          echo "Generic Public Key (ED25519): ${{ steps.solo.outputs.publicKey }}"
          echo "ECDSA Account ID: ${{ steps.solo.outputs.ecdsaAccountId }}"
          echo "ECDSA Private Key: ${{ steps.solo.outputs.ecdsaPrivateKey }}"
          echo "ECDSA Public Key: ${{ steps.solo.outputs.ecdsaPublicKey }}"

          echo "ED25519 Account ID: ${{ steps.solo.outputs.ed25519AccountId }}"
          echo "ED25519 Private Key: ${{ steps.solo.outputs.ed25519PrivateKey }}"
          echo "ED25519 Public Key: ${{ steps.solo.outputs.ed25519PublicKey }}"

          # Wait for the mirror node to be fully up and running
          sleep 10

          RESPONSE=$(curl -s -w "%{http_code}" -X 'GET' 'http://localhost:5551/api/v1/network/nodes' -H 'accept: application/json' -o response.json)

          if [ "$RESPONSE" -ne 200 ]; then
            echo "❌ Error: API request failed with status code $RESPONSE"
            cat response.json
            exit 1
          else
            echo "✅ API request successful"
            cat response.json
          fi

  validate-json-rpc-relay:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⚙️ Setup Hiero Solo with JSON-RPC Relay
        id: solo
        uses: ./
        with:
          installRelay: true

      - name: ✅ Validate JSON-RPC Relay
        env:
          ACCOUNT_ID: ${{ steps.solo.outputs.accountId }}
          PRIVATE_KEY: ${{ steps.solo.outputs.privateKey }}
          PUBLIC_KEY: ${{ steps.solo.outputs.publicKey }}
          ECDSA_ACCOUNT_ID: ${{ steps.solo.outputs.ecdsaAccountId }}
          ECDSA_PRIVATE_KEY: ${{ steps.solo.outputs.ecdsaPrivateKey }}
          ECDSA_PUBLIC_KEY: ${{ steps.solo.outputs.ecdsaPublicKey }}
          ED25519_ACCOUNT_ID: ${{ steps.solo.outputs.ed25519AccountId }}
          ED25519_PRIVATE_KEY: ${{ steps.solo.outputs.ed25519PrivateKey }}
          ED25519_PUBLIC_KEY: ${{ steps.solo.outputs.ed25519PublicKey }}
        run: |
          ${GITHUB_WORKSPACE}/scripts/check-accounts.sh

          # Log Account details for Generic (ED25519), ECDSA, and ED25519
          echo "Generic Account ID (ED25519): ${{ steps.solo.outputs.accountId }}"
          echo "Generic Private Key (ED25519): ${{ steps.solo.outputs.privateKey }}"
          echo "Generic Public Key (ED25519): ${{ steps.solo.outputs.publicKey }}"
          echo "ECDSA Account ID: ${{ steps.solo.outputs.ecdsaAccountId }}"
          echo "ECDSA Private Key: ${{ steps.solo.outputs.ecdsaPrivateKey }}"
          echo "ECDSA Public Key: ${{ steps.solo.outputs.ecdsaPublicKey }}"

          echo "ED25519 Account ID: ${{ steps.solo.outputs.ed25519AccountId }}"
          echo "ED25519 Private Key: ${{ steps.solo.outputs.ed25519PrivateKey }}"
          echo "ED25519 Public Key: ${{ steps.solo.outputs.ed25519PublicKey }}"

          # Port-forwards from the setup step do not carry over to the next step; start one here.
          # Relay Service name varies by Solo/chart version (e.g. relay-1 vs relay-node1-hedera-json-rpc-relay).
          RELAY_SVC=""
          if kubectl get svc relay-node1-hedera-json-rpc-relay -n solo >/dev/null 2>&1; then
            RELAY_SVC=relay-node1-hedera-json-rpc-relay
          elif kubectl get svc relay-1 -n solo >/dev/null 2>&1; then
            RELAY_SVC=relay-1
          fi
          if [ -z "${RELAY_SVC}" ]; then
            echo "❌ Error: JSON-RPC relay service not found (tried relay-node1-hedera-json-rpc-relay, relay-1)"
            kubectl get svc -n solo
            exit 1
          fi
          echo "Using relay Service: ${RELAY_SVC}"
          kubectl port-forward "svc/${RELAY_SVC}" -n solo 7546:7546 &
          PF_PID=$!
          trap 'kill "${PF_PID}" 2>/dev/null || true' EXIT
          sleep 2

          RESPONSE=000
          for _ in $(seq 1 90); do
            RESPONSE=$(curl -s -w "%{http_code}" -X POST 'http://localhost:7546' \
              -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' \
              -o response.json) || RESPONSE="000"
            if [ "$RESPONSE" = "200" ]; then
              break
            fi
            sleep 2
          done
          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Error: JSON-RPC request failed with status code $RESPONSE"
            echo "Response body:"
            cat response.json
            echo "Checking if relay service is running:"
            kubectl get pods -n solo | grep relay
            exit 1
          fi
          CHAIN_ID=$(jq -r '.result' response.json)
          if [ -z "$CHAIN_ID" ] || [ "$CHAIN_ID" = "null" ]; then
            echo "❌ Error: Invalid or missing chainId in response"
            echo "Response body:"
            cat response.json
            exit 1
          fi
          echo "✅ JSON-RPC Relay request successful"
          echo "Chain ID: $CHAIN_ID"
          cat response.json

  validate-grpc-connections:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: 🚀 Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⚙️ Setup Hiero Solo
        id: solo
        uses: ./

      - name: Install grpcurl
        run: |
          curl -sSL https://github.com/fullstorydev/grpcurl/releases/download/v1.8.7/grpcurl_1.8.7_linux_x86_64.tar.gz | sudo tar -xz -C /usr/local/bin grpcurl
          sudo chmod +x /usr/local/bin/grpcurl
          echo "grpcurl installed at: $(which grpcurl)"
          echo "grpcurl version: $(grpcurl --version)"

      - name: ✅ Validate gRPC Connections
        env:
          INSTALL_MIRROR_NODE: false
        run: |
          chmod +x ${GITHUB_WORKSPACE}/scripts/check-grpc-connections.sh
          bash ${GITHUB_WORKSPACE}/scripts/check-grpc-connections.sh

  validate-grpc-connections-with-mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: 🚀 Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⚙️ Setup Hiero Solo with Mirror Node
        id: solo
        uses: ./
        with:
          installMirrorNode: true

      - name: Install grpcurl
        run: |
          curl -sSL https://github.com/fullstorydev/grpcurl/releases/download/v1.8.7/grpcurl_1.8.7_linux_x86_64.tar.gz | sudo tar -xz -C /usr/local/bin grpcurl
          sudo chmod +x /usr/local/bin/grpcurl
          echo "grpcurl installed at: $(which grpcurl)"
          echo "grpcurl version: $(grpcurl --version)"

      - name: ✅ Validate gRPC Connections with Mirror Node
        env:
          INSTALL_MIRROR_NODE: true
        run: |
          chmod +x ${GITHUB_WORKSPACE}/scripts/check-grpc-connections.sh
          bash ${GITHUB_WORKSPACE}/scripts/check-grpc-connections.sh
